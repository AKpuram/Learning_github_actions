name: Python Hello world

on: 
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  Hello-world:
   runs-on: ubuntu-latest

   steps:
     - name: Checkout Repository
       uses: actions/checkout@v4

     - name: Set up python
       uses: actions/setup-python@v5
       with:
         python-version: '3.10'

     - name: Run python script
       run: python .github/workflows/python_scripts/hello.py
   
    
