name: Schedule jobs:

  on:
    schedule:
      - cron: '*/5 * * * *'

jobs:
  run-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python Script
        run: python .github/workflows/python_scripts/hello.py
      
